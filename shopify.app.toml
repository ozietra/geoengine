# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a63ee7487084e0fe28443f178bfed4e5"
name = "GEO Engine"
application_url = "https://geoengine-d1o3.onrender.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,read_content"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Re-scan a product immediately when the merchant saves changes in the
  # Shopify admin so scan scores never go stale between weekly auto-scans.
  [[webhooks.subscriptions]]
  uri = "/webhooks/products/update"
  topics = [ "products/update" ]

  # Mandatory GDPR compliance webhooks - required for Shopify App Store review
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  topics = [ "shop/redact" ]

[auth]
redirect_urls = [
  "https://geoengine-d1o3.onrender.com/auth/callback",
  "https://geoengine-d1o3.onrender.com/api/auth"
]

# Agentic Storefront — serves the merchant's llms.txt on their own storefront
# domain at https://{store}/apps/geo/llms.txt so AI agents and LLM crawlers can
# read the catalog. Requests are forwarded to /proxy/* in this app.
[app_proxy]
url = "https://geoengine-d1o3.onrender.com/proxy"
subpath = "geo"
prefix = "apps"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
