<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 1200px; overflow: hidden; }
  .tile {
    width: 1200px; height: 1200px; position: relative;
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 58%, #3b82f6 100%);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  /* faint dot grid */
  .tile::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 2px, transparent 2px);
    background-size: 46px 46px;
  }
  .glyph { width: 660px; height: 660px; position: relative; z-index: 1; margin-top: -30px; }
  .word { z-index: 1; color: #fff; font-weight: 800; font-size: 96px; letter-spacing: 14px;
          margin-top: 24px; text-shadow: 0 4px 24px rgba(0,0,0,0.25); }
  .sub { z-index: 1; color: #bfdbfe; font-weight: 600; font-size: 30px; letter-spacing: 7px;
         margin-top: 14px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="tile">
    <svg class="glyph" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#ffffff" stroke-width="8.5" stroke-linecap="round" fill="none">
        <path d="M70 104 A 34 34 0 0 1 104 138" opacity="0.95"/>
        <path d="M70 82 A 56 56 0 0 1 126 138" opacity="0.62"/>
        <path d="M70 60 A 78 78 0 0 1 148 138" opacity="0.34"/>
      </g>
      <circle cx="94" cy="114" r="6.5" fill="#ffffff"/>
      <circle cx="110" cy="98" r="6" fill="#7dd3fc"/>
      <circle cx="126" cy="82" r="8" fill="#34d399"/>
      <circle cx="70" cy="138" r="17" fill="#ffffff"/>
      <circle cx="70" cy="138" r="7.5" fill="#1e3a8a"/>
    </svg>
    <div class="word">GEO</div>
    <div class="sub">Engine</div>
  </div>
</body>
</html>
